<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickComm Platform</title>

    <!-- SMART MANIFEST INJECTOR: Tells Chrome which app to install -->
    <script>
      (function() {
        const path = window.location.pathname;
        let manifestPath = '/manifest-customer.json'; // Default to customer
        
        if (path.startsWith('/admin')) {
          manifestPath = '/manifest-admin.json';
        } else if (path.startsWith('/retailer')) {
          manifestPath = '/manifest-retailer.json';
        } else if (path.startsWith('/agent')) {
          manifestPath = '/manifest-agent.json';
        }

        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestPath;
        document.head.appendChild(link);
      })();
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
