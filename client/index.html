<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <script>
      (function() {
        var path = window.location.pathname;
        var manifestUrl = '/manifest-customer.json';
        var themeColor = '#4f46e5'; 

        if (path.startsWith('/retailer')) { 
          manifestUrl = '/manifest-retailer.json'; themeColor = '#059669'; 
        } else if (path.startsWith('/admin')) { 
          manifestUrl = '/manifest-admin.json'; themeColor = '#111827'; 
        } else if (path.startsWith('/agent')) { 
          manifestUrl = '/manifest-agent.json'; themeColor = '#d946ef'; 
        }

        // Create and append the tags before the rest of the page loads
        var manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestUrl;
        document.head.appendChild(manifestLink);

        var themeMeta = document.createElement('meta');
        themeMeta.name = 'theme-color';
        themeMeta.content = themeColor;
        document.head.appendChild(themeMeta);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
