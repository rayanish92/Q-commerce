<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <!-- THE SAFE SMART PWA INJECTOR -->
    <script>
      (function() {
        const path = window.location.pathname;
        let manifestUrl = '/manifest-customer.json';
        let title = 'QuickComm';
        let themeColor = '#4f46e5'; 

        if (path.startsWith('/retailer')) { 
          manifestUrl = '/manifest-retailer.json'; title = 'Retailer Desk'; themeColor = '#059669'; 
        } else if (path.startsWith('/admin')) { 
          manifestUrl = '/manifest-admin.json'; title = 'Admin Core'; themeColor = '#111827'; 
        } else if (path.startsWith('/agent')) { 
          manifestUrl = '/manifest-agent.json'; title = 'Delivery Fleet'; themeColor = '#d946ef'; 
        }

        document.title = title;

        // Wait for the DOM to load, then SWAP the default manifest Vite injected
        window.addEventListener('DOMContentLoaded', () => {
          const manifestTag = document.querySelector('link[rel="manifest"]');
          if (manifestTag) {
            manifestTag.href = manifestUrl;
          }

          const themeTag = document.querySelector('meta[name="theme-color"]');
          if (themeTag) {
            themeTag.content = themeColor;
          } else {
            const newTheme = document.createElement('meta');
            newTheme.name = 'theme-color';
            newTheme.content = themeColor;
            document.head.appendChild(newTheme);
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
